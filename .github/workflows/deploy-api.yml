name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 按 commit SHA 打唯一 tag：containerapp 引用变化才会滚动新 revision，
      # 直接复用 :latest 不会（踩过的坑）
      - name: Build image
        run: |
          cd apps/api
          az acr build \
            --registry nbpacr \
            --resource-group nbp-rg \
            --image findit-api:${{ github.sha }} \
            --image findit-api:latest \
            --file Dockerfile .

      - name: Update Container App
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az containerapp update \
            --name findit-api \
            --resource-group nbp-rg \
            --image nbpacr.azurecr.io/findit-api:${{ github.sha }}

      - name: Verify
        run: |
          sleep 15
          code=$(curl -s -o /dev/null -w "%{http_code}" https://findit-api.livelysky-debdec5e.japaneast.azurecontainerapps.io/health)
          echo "health: $code"
          test "$code" = "200"
